name: loan_lead_app
description: A modern fintech loan lead generation app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1

  # Backend & Auth
  parse_server_sdk_flutter: ^10.7.0
  google_sign_in: ^6.1.5
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3

  # Networking
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI Helpers
  pinput: ^3.0.1
  fluttertoast: ^8.2.4

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
